name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Create env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build
        run: npm run build
        env:
          VITE_BUILD_ID: ${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5

      - name: Verify deploy succeeded
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after retry."
          exit 1
