name: Build Executables on Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.1.2)'
        required: true
        default: 'v1.1.2'

jobs:
  build:
    name: Build Go and Python Dumpers
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read dumper version
        id: version
        run: |
          VERSION=$(node -p "require('./scripts/bp-dumper/version.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building BP Dumper v$VERSION"

      - name: Sync min game version into dumper sources
        id: mingame
        run: |
          node scripts/lib/syncDumperMinGameVersion.mjs
          MIN_VER=$(node -p "require('./src/data/game-build-version.json').version.replace(/\\.x$/,'').match(/^\\d+\\.\\d+/)[0]")
          echo "min_version=$MIN_VER" >> "$GITHUB_OUTPUT"
          echo "Min game version: $MIN_VER"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go binaries
        env:
          DUMPER_VERSION: ${{ steps.version.outputs.version }}
          MIN_GAME_VERSION: ${{ steps.mingame.outputs.min_version }}
        run: |
          cd scripts/bp-dumper-go
          mkdir -p dist
          LDFLAGS="-X main.DumperVersion=${DUMPER_VERSION} -X main.MinGameVersion=${MIN_GAME_VERSION} -s -w"

          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/bp-dumper-windows.exe
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/bp-dumper-mac-intel
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/bp-dumper-mac-silicon
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/bp-dumper-linux

      - name: Package Python dumper
        run: |
          cd scripts/bp-dumper-py
          zip -r ../bp-dumper-py.zip dumper.py _version.py _min_game_version.py blueprint_lookup.py lookup.json requirements.txt README.md dumper.bat dumper.sh

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            scripts/bp-dumper-go/dist/bp-dumper-windows.exe
            scripts/bp-dumper-go/dist/bp-dumper-mac-intel
            scripts/bp-dumper-go/dist/bp-dumper-mac-silicon
            scripts/bp-dumper-go/dist/bp-dumper-linux
            scripts/bp-dumper-py.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
