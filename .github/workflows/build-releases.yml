name: Build Executables on Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'
  # Tag releases disabled until Log Watcher launch — use workflow_dispatch only.
  # push:
  #   tags:
  #     - 'v*'

jobs:
  build:
    name: Build Go Executables
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries
        run: |
          cd scripts/bp-dumper-go
          mkdir -p dist
          
          # Windows x64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/bp-dumper-windows.exe
          
          # macOS Intel & Apple Silicon
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/bp-dumper-mac-intel
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/bp-dumper-mac-silicon
          
          # Linux x64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/bp-dumper-linux

      - name: Package Python Dumper
        run: |
          cd scripts/bp-dumper-py
          zip -r ../bp-dumper-py.zip dumper.py blueprint_lookup.py lookup.json requirements.txt README.md dumper.bat dumper.sh

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            scripts/bp-dumper-go/dist/bp-dumper-windows.exe
            scripts/bp-dumper-go/dist/bp-dumper-mac-intel
            scripts/bp-dumper-go/dist/bp-dumper-mac-silicon
            scripts/bp-dumper-go/dist/bp-dumper-linux
            scripts/bp-dumper-py.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
