name: Build Executables on Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: dumper.exe
            asset_name: bp-dumper-windows.exe
          - os: macos-latest
            artifact_name: dumper
            asset_name: bp-dumper-mac
          - os: ubuntu-latest
            artifact_name: dumper
            asset_name: bp-dumper-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: Build with PyInstaller
        shell: bash
        run: |
          cd scripts/bp-dumper
          pyinstaller --onefile --console --name dumper dumper.py

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: scripts/bp-dumper/dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
