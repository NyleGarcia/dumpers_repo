name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Create env file
        run: |
          echo "VITE_SUPABASE_URL=https://placeholder.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=placeholder-anon-key" >> .env

      - name: Build
        run: npm run build
        env:
          VITE_BUILD_ID: ci-${{ github.sha }}
